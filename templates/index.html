<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>
        Nigeria State Intelligence Assistant
    </title>

    <style>

        body {

            font-family: Arial, sans-serif;

            background-color: #f4f4f4;

            margin: 0;

            padding: 0;
        }

        .container {

            width: 80%;

            max-width: 900px;

            margin: 40px auto;

            background: white;

            padding: 30px;

            border-radius: 10px;

            box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
        }

        h1 {

            text-align: center;

            color: #222;
        }

        p {

            text-align: center;

            color: #555;
        }

        textarea {

            width: 100%;

            height: 120px;

            padding: 15px;

            border-radius: 8px;

            border: 1px solid #ccc;

            font-size: 16px;

            resize: vertical;
        }

        button {

            margin-top: 20px;

            width: 100%;

            padding: 15px;

            border: none;

            border-radius: 8px;

            background-color: #2563eb;

            color: white;

            font-size: 18px;

            cursor: pointer;
        }

        button:hover {

            background-color: #1d4ed8;
        }

        .response-box {

            margin-top: 40px;

            background-color: #f9fafb;

            padding: 20px;

            border-radius: 8px;

            border-left: 5px solid #2563eb;

            white-space: pre-wrap;

            line-height: 1.6;
        }

        .footer {

            margin-top: 30px;

            text-align: center;

            font-size: 14px;

            color: gray;
        }

    </style>

</head>

<body>

    <div class="container">

        <h1>
            Nigeria State Intelligence Assistant
        </h1>

        <p>
            Ask questions about Nigerian states, capitals, governors,
            population, geography, and socio-economic information.
        </p>

        <form action="/ask" method="post">

            <textarea
                name="query"
                placeholder="Example: What is the capital of Kano State?"
                required>
            </textarea>

            <button type="submit">
                Ask Question
            </button>

        </form>

        {% if response %}

        <div class="response-box">

            <h3>Assistant Response</h3>

            <p>{{ response }}</p>

        </div>

        {% endif %}

        <div class="footer">

            Built with FastAPI, FAISS, BM25, Transformers, and Hugging Face Spaces.

        </div>

    </div>

</body>

</html>
